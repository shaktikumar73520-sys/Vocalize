name: Build Debug APK

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'vocalize-android/**'
      - '.github/workflows/build-debug-apk.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'vocalize-android/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x vocalize-android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            vocalize-android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('vocalize-android/**/*.gradle*', 'vocalize-android/**/libs.versions.toml', 'vocalize-android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: vocalize-android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vocalize-debug-${{ github.run_number }}
          path: vocalize-android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Display APK info
        working-directory: vocalize-android
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "✅ APK built successfully: $APK_PATH"
            echo "📦 APK size: $(du -sh "$APK_PATH" | cut -f1)"
          else
            echo "❌ APK not found!"
            exit 1
          fi
